<script>

  function doLogin() {
    var username = document.getElementById('username').value;
    var password = document.getElementById('password').value;

    if (username == "" || password == "") {
      document.getElementById('loginError').innerText = "Please enter username and password";
      return;
    }

    google.script.run.withSuccessHandler(function(result) {
      if (result == true) {
        document.getElementById('loginPage').style.display = "none";
        document.getElementById('mainPage').style.display = "block";
        showSection('dashboard');
        loadDashboard();
      } else {
        document.getElementById('loginError').innerText = "Invalid username or password";
      }
    }).checkLogin(username, password);
  }

  function logout() {
    document.getElementById('mainPage').style.display = "none";
    document.getElementById('loginPage').style.display = "block";
    document.getElementById('username').value = "";
    document.getElementById('password').value = "";
  }

  function showSection(sectionId) {
    // hide all sections first
    var sections = document.getElementsByClassName('page-section');
    for (var i = 0; i < sections.length; i++) {
      sections[i].classList.remove('active-section');
    }
    document.getElementById(sectionId).classList.add('active-section');

    if (sectionId == 'dashboard') {
      loadDashboard();
    } else if (sectionId == 'employee') {
      loadEmployeeTable();
    } else if (sectionId == 'salary') {
      loadSalaryTable();
      loadEmployeeDropdown('salaryEmpId');
    } else if (sectionId == 'credit') {
      loadCreditTable();
      loadEmployeeDropdown('creditEmpId');
    } else if (sectionId == 'reports') {
      loadReports();
    }
  }

  function loadDashboard() {
    google.script.run.withSuccessHandler(function(employees) {
      document.getElementById('totalEmployees').innerText = employees.length;
    }).getEmployees();

    google.script.run.withSuccessHandler(function(salaryData) {
      var totalNet = 0;
      for (var i = 0; i < salaryData.length; i++) {
        totalNet = totalNet + Number(salaryData[i][5]);
      }
      document.getElementById('totalSalaryPaid').innerText = totalNet;
    }).getSalaryData();

    google.script.run.withSuccessHandler(function(creditData) {
      var totalPending = 0;
      for (var i = 0; i < creditData.length; i++) {
        totalPending = totalPending + Number(creditData[i][4]);
      }
      document.getElementById('totalCreditPending').innerText = totalPending;
    }).getCreditData();
  }

  

  function loadEmployeeTable() {
    google.script.run.withSuccessHandler(function(data) {
      var tableBody = document.getElementById('employeeTableBody');
      tableBody.innerHTML = "";

      for (var i = 0; i < data.length; i++) {
        var row = "<tr>" +
          "<td>" + data[i][0] + "</td>" +
          "<td>" + data[i][1] + "</td>" +
          "<td>" + data[i][2] + "</td>" +
          "<td>" + data[i][3] + "</td>" +
          "<td>" + data[i][4] + "</td>" +
          "<td>" +
            "<button onclick='editEmployee(\"" + data[i][0] + "\",\"" + data[i][1] + "\",\"" + data[i][2] + "\",\"" + data[i][3] + "\",\"" + data[i][4] + "\")'>Edit</button> " +
            "<button onclick='removeEmployee(\"" + data[i][0] + "\")'>Delete</button>" +
          "</td>" +
        "</tr>";
        tableBody.innerHTML += row;
      }
    }).getEmployees();
  }

  function saveEmployee() {
    var empId = document.getElementById('empId').value;
    var name = document.getElementById('empName').value;
    var department = document.getElementById('empDept').value;
    var designation = document.getElementById('empDesignation').value;
    var contact = document.getElementById('empContact').value;

    if (empId == "" || name == "") {
      alert("Please fill Employee ID and Name");
      return;
    }

    google.script.run.withSuccessHandler(function(result) {
      alert(result);
      clearEmployeeForm();
      loadEmployeeTable();
    }).addEmployee(empId, name, department, designation, contact);
  }

  function editEmployee(empId, name, department, designation, contact) {
    document.getElementById('empId').value = empId;
    document.getElementById('empName').value = name;
    document.getElementById('empDept').value = department;
    document.getElementById('empDesignation').value = designation;
    document.getElementById('empContact').value = contact;
  }

  function updateEmployeeData() {
    var empId = document.getElementById('empId').value;
    var name = document.getElementById('empName').value;
    var department = document.getElementById('empDept').value;
    var designation = document.getElementById('empDesignation').value;
    var contact = document.getElementById('empContact').value;

    if (empId == "") {
      alert("Please enter Employee ID to update");
      return;
    }

    google.script.run.withSuccessHandler(function(result) {
      alert(result);
      clearEmployeeForm();
      loadEmployeeTable();
    }).updateEmployee(empId, name, department, designation, contact);
  }

  function removeEmployee(empId) {
    var confirmDelete = confirm("Are you sure you want to delete this employee?");
    if (confirmDelete) {
      google.script.run.withSuccessHandler(function(result) {
        alert(result);
        loadEmployeeTable();
      }).deleteEmployee(empId);
    }
  }

  function clearEmployeeForm() {
    document.getElementById('empId').value = "";
    document.getElementById('empName').value = "";
    document.getElementById('empDept').value = "";
    document.getElementById('empDesignation').value = "";
    document.getElementById('empContact').value = "";
  }


  function loadEmployeeDropdown(dropdownId) {
    google.script.run.withSuccessHandler(function(data) {
      var dropdown = document.getElementById(dropdownId);
      dropdown.innerHTML = "<option value=''>-- Select Employee --</option>";

      for (var i = 0; i < data.length; i++) {
        var option = "<option value='" + data[i][0] + "'>" + data[i][0] + " - " + data[i][1] + "</option>";
        dropdown.innerHTML += option;
      }
    }).getEmployees();
  }

  function loadSalaryTable() {
    google.script.run.withSuccessHandler(function(data) {
      var tableBody = document.getElementById('salaryTableBody');
      tableBody.innerHTML = "";

      for (var i = 0; i < data.length; i++) {
        var row = "<tr>" +
          "<td>" + data[i][0] + "</td>" +
          "<td>" + data[i][1] + "</td>" +
          "<td>" + data[i][2] + "</td>" +
          "<td>" + data[i][3] + "</td>" +
          "<td>" + data[i][4] + "</td>" +
          "<td>" + data[i][5] + "</td>" +
        "</tr>";
        tableBody.innerHTML += row;
      }
    }).getSalaryData();
  }

  function saveSalary() {
    var empId = document.getElementById('salaryEmpId').value;
    var empName = document.getElementById('salaryEmpId').options[document.getElementById('salaryEmpId').selectedIndex].text;
    var basic = document.getElementById('basicSalary').value;
    var bonus = document.getElementById('bonus').value;
    var deduction = document.getElementById('deduction').value;

    if (empId == "" || basic == "") {
      alert("Please select employee and enter basic salary");
      return;
    }

    if (bonus == "") bonus = 0;
    if (deduction == "") deduction = 0;

    google.script.run.withSuccessHandler(function(result) {
      alert(result);
      document.getElementById('basicSalary').value = "";
      document.getElementById('bonus').value = "";
      document.getElementById('deduction').value = "";
      loadSalaryTable();
    }).addSalary(empId, empName, basic, bonus, deduction);
  }


  function loadCreditTable() {
    google.script.run.withSuccessHandler(function(data) {
      var tableBody = document.getElementById('creditTableBody');
      tableBody.innerHTML = "";

      for (var i = 0; i < data.length; i++) {
        var row = "<tr>" +
          "<td>" + data[i][0] + "</td>" +
          "<td>" + data[i][1] + "</td>" +
          "<td>" + data[i][2] + "</td>" +
          "<td>" + data[i][3] + "</td>" +
          "<td>" + data[i][4] + "</td>" +
          "<td>" + data[i][5] + "</td>" +
        "</tr>";
        tableBody.innerHTML += row;
      }
    }).getCreditData();
  }

  function saveCredit() {
    var creditId = document.getElementById('creditId').value;
    var empId = document.getElementById('creditEmpId').value;
    var empName = document.getElementById('creditEmpId').options[document.getElementById('creditEmpId').selectedIndex].text;
    var amount = document.getElementById('creditAmount').value;

    if (creditId == "" || empId == "" || amount == "") {
      alert("Please fill all credit fields");
      return;
    }

    google.script.run.withSuccessHandler(function(result) {
      alert(result);
      document.getElementById('creditId').value = "";
      document.getElementById('creditAmount').value = "";
      loadCreditTable();
    }).addCredit(creditId, empId, empName, amount);
  }

  function payCredit() {
    var creditId = document.getElementById('payCreditId').value;
    var paidAmount = document.getElementById('paidAmount').value;

    if (creditId == "" || paidAmount == "") {
      alert("Please enter Credit ID and paid amount");
      return;
    }

    google.script.run.withSuccessHandler(function(result) {
      alert(result);
      document.getElementById('payCreditId').value = "";
      document.getElementById('paidAmount').value = "";
      loadCreditTable();
    }).updateCreditBalance(creditId, paidAmount);
  }


  function loadReports() {
    
    google.script.run.withSuccessHandler(function(data) {
      var tableBody = document.getElementById('reportEmployeeBody');
      tableBody.innerHTML = "";
      for (var i = 0; i < data.length; i++) {
        tableBody.innerHTML += "<tr><td>" + data[i][0] + "</td><td>" + data[i][1] + "</td><td>" + data[i][2] + "</td></tr>";
      }
    }).getEmployees();

   
    google.script.run.withSuccessHandler(function(data) {
      var tableBody = document.getElementById('reportSalaryBody');
      tableBody.innerHTML = "";
      for (var i = 0; i < data.length; i++) {
        tableBody.innerHTML += "<tr><td>" + data[i][0] + "</td><td>" + data[i][1] + "</td><td>" + data[i][5] + "</td></tr>";
      }
    }).getSalaryData();


    google.script.run.withSuccessHandler(function(data) {
      var tableBody = document.getElementById('reportCreditBody');
      tableBody.innerHTML = "";
      for (var i = 0; i < data.length; i++) {
        tableBody.innerHTML += "<tr><td>" + data[i][0] + "</td><td>" + data[i][2] + "</td><td>" + data[i][4] + "</td><td>" + data[i][5] + "</td></tr>";
      }
    }).getCreditData();
  }
</script>
